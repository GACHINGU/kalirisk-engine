data_contract:
  raw_columns:
    - id
    - loan_amnt
    - term
    - int_rate
    - installment
    - grade
    - sub_grade
    - home_ownership
    - annual_inc
    - verification_status
    - issue_d
    - loan_status
    - purpose
    - dti
    - fico_range_low
    - fico_range_high

  valid_ranges:
    fico_range_low: {min: 300, max: 850}
    fico_range_high: {min: 300, max: 850}
    dti: {min: 0, max: 500}
    int_rate: {min: 0, max: 100}

  target:
    source_column: loan_status
    default_statuses:
      - "Charged Off"
      - "Default"
      - "Late (31-120 days)"
    output_column: is_default

  leakage_excluded:
    - loan_status

  missing_value_sentinels:
    dti:
      - 999
      - -1
  
  required_not_null:
    - loan_amnt
  
  train_test_split:
    train_end_date: "2017-12-31"
    test_start_date: "2018-01-01"

  financial_assumptions:
    ead_basis: loan_amnt # conservative: uses full original loan amount as exposure, not outstanding balance.
    lgd: 0.90 # unsecured personal loans - low recovery, industry-typical assumption
    principal_basis: loan_amnt   # conservative: uses full original loan amount as the basis for interest income, not declining balance
    cost_of_capital_rate: 5 # percent annual - blended cost of funds assumption